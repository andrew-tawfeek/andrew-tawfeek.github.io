  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-dark" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-light" disabled />

  <!-- Prevent flash of wrong theme -->
  <script>
    (function() {
      var saved = localStorage.getItem('site-theme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    /* Tutorial prose typography */
    .tutorial-prose {
      max-width: 48rem;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.8;
    }

    .tutorial-prose h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .tutorial-prose .tutorial-header-meta {
      color: var(--text-secondary, #888);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .tutorial-prose .tutorial-header-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .tutorial-prose h2 {
      font-size: 1.5rem;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .tutorial-prose h3 {
      font-size: 1.2rem;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
    }

    .tutorial-prose p {
      margin-bottom: 1rem;
    }

    .tutorial-prose pre {
      border-radius: 0.5rem;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      background: var(--bg-elevated, #1e2433);
      border: 1px solid var(--border-subtle, #2a3147);
    }

    .tutorial-prose code {
      font-family: var(--font-mono, 'JetBrains Mono'), 'Fira Code', monospace;
      font-size: 0.9em;
    }

    .tutorial-prose p code,
    .tutorial-prose li code {
      background: var(--bg-elevated, #1e2433);
      color: var(--text-primary, #e8eaf0);
      padding: 0.15em 0.4em;
      border-radius: 0.25rem;
    }

    .tutorial-prose blockquote {
      border-left: 3px solid var(--accent, #6c63ff);
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: var(--text-secondary, #888);
      font-style: italic;
    }

    .tutorial-prose ul,
    .tutorial-prose ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    .tutorial-prose li {
      margin-bottom: 0.4rem;
    }

    .tutorial-prose img {
      max-width: 100%;
      border-radius: 0.5rem;
    }

    .tutorial-prose .katex-display {
      overflow-x: auto;
      padding: 0.5rem 0;
    }

    /* Interactive Python blocks */
    .interactive-block {
      border: 1px solid var(--border-subtle, #2a3147);
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .interactive-block .interactive-label {
      background: var(--bg-elevated, #1e2433);
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary, #9aa5be);
      border-bottom: 1px solid var(--border-subtle, #2a3147);
    }

    .pyscript-output {
      padding: 1rem;
      min-height: 2rem;
      font-family: var(--font-body, 'TeXGyrePagella'), 'Palatino Linotype', Palatino, Georgia, serif;
      font-size: 0.9rem;
      color: var(--text-primary, #e8eaf0);
    }

    /* Hide the empty output div — PyScript renders into its own <script-py> element instead */
    .pyscript-output:empty {
      display: none;
      padding: 0;
      min-height: 0;
    }

    .pyscript-loading {
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: var(--text-muted, #5f6b85);
      font-style: italic;
    }

    .pyscript-loading::before {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border-medium, #374160);
      border-top-color: var(--accent, #5b8fa8);
      border-radius: 50%;
      animation: pyscript-spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes pyscript-spin {
      to { transform: rotate(360deg); }
    }

    .tutorial-loading {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-secondary, #888);
    }

    .tutorial-error {
      text-align: center;
      padding: 4rem 1rem;
      color: #e74c3c;
    }
  </style>
